<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Laporan Kegiatan SDN Senden 2</title>
    <style>
        /* DESAIN AESTHETIC STUDIO - 100% AMAN UNTUK DOWNLOAD DI HP */
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc; 
            color: #1e293b;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        .wrapper {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* TAMPILAN PANEL INPUT (STUDIO CLEAN) */
        .panel-input {
            background: #ffffff;
            padding: 24px;
            border-radius: 24px;
            border: 1px solid #f1f5f9;
            box-shadow: 0 4px 18px rgba(15, 23, 42, 0.03);
        }
        .title-main { font-size: 18px; font-weight: 700; color: #0f172a; letter-spacing: -0.5px; }
        .subtitle-main { font-size: 11px; color: #64748b; margin-top: 4px; margin-bottom: 20px; }
        
        .grid-kembar { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
        .grup-field { display: flex; flex-direction: column; gap: 6px; }
        .label-style { font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
        
        input[type="text"], input[type="date"] {
            width: 100%; padding: 10px 14px; font-size: 13px; background: #f8fafc;
            border: 1px solid #e2e8f0; border-radius: 12px; outline: none; color: #334155;
        }
        input:focus { border-color: #2563eb; background: #ffffff; }

        /* Tombol Pilih Jumlah Slot */
        .wrapper-slot { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 4px; margin-bottom: 16px; }
        .btn-pilih-slot {
            padding: 10px; font-size: 13px; font-weight: 600; background: #ffffff;
            border: 1px solid #e2e8f0; border-radius: 10px; cursor: pointer; color: #475569;
        }
        .btn-pilih-slot.aktif { background: #2563eb !important; color: #ffffff !important; border-color: #2563eb !important; }

        /* Box Formulir Kegiatan */
        .box-kegiatan-input {
            background: #f8fafc; padding: 16px; border-radius: 16px; border: 1px solid #e2e8f0;
            margin-bottom: 12px; display: flex; flex-direction: column; gap: 10px;
        }
        .text-kegiatan-id { font-size: 11px; font-weight: 700; color: #2563eb; letter-spacing: 0.5px; }
        input[type="file"] { font-size: 11px; color: #64748b; margin-top: 4px; }

        /* Tombol Unduh Estetik */
        .btn-unduh-jpg {
            width: 100%; padding: 14px; background: #2563eb; color: #ffffff; border: none;
            border-radius: 14px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.15); display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        /* ==================================================== */
        /* TAMPILAN LEMBAR POSTER (CANVA STYLE & CLEAN STUDIO) */
        /* ==================================================== */
        .text-pratinjau-tag { font-size: 11px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; align-self: flex-start; }
        
        #templateLaporan {
            width: 450px; background: #ffffff; padding: 28px; border-radius: 2px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08); border: 1px solid #e2e8f0;
            position: relative; display: flex; flex-direction: column; justify-content: space-between;
            overflow: hidden; user-select: none;
        }
        .top-accent-line { position: absolute; top: 0; left: 0; right: 0; height: 6px; background: #2563eb; }
        
        /* Header Laporan */
        .header-poster { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; padding-bottom: 14px; margin-bottom: 16px; }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .logo-sekolah-box { width: 36px; height: 36px; background: #eff6ff; border: 1px solid #bfdbfe; color: #2563eb; font-weight: 700; font-size: 11px; display: flex; align-items: center; justify-content: center; border-radius: 10px; }
        .title-sekolah { font-size: 13px; font-weight: 700; color: #0f172a; tracking-tight: -0.5px; }
        .subtitle-sekolah { font-size: 8px; color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 1px; }
        .badge-tanggal { background: #f1f5f9; color: #334155; font-size: 9px; font-weight: 600; padding: 4px 10px; border-radius: 20px; }

        /* List Render Kegiatan Harian */
        .konten-kegiatan-render { display: flex; flex-direction: column; gap: 20px; flex-grow: 1; justify-content: center; }
        .baris-kegiatan { display: flex; flex-direction: column; gap: 6px; border-bottom: 1px solid #f8fafc; padding-bottom: 16px; }
        .baris-kegiatan:last-child { border-bottom: none; padding-bottom: 0; }
        
        /* Nama Kegiatan (Di Atas Foto) */
        .render-nama-kegiatan { font-size: 12px; font-weight: 700; color: #1e293b; line-height: 1.35; }
        
        /* Bingkai Foto */
        .render-bingkai-foto { width: 100%; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .render-bingkai-foto img { width: 100%; height: 100%; object-fit: cover; }
        .render-bingkai-foto svg { width: 24px; height: 24px; color: #cbd5e1; }
        
        /* Deskripsi Kegiatan (Di Bawah Foto) */
        .render-deskripsi-kegiatan { font-size: 10px; color: #64748b; line-height: 1.45; text-align: justify; }

        /* Footer Lembar */
        .footer-poster { border-top: 1px solid #f1f5f9; padding-top: 12px; display: flex; justify-content: space-between; align-items: center; font-size: 8.5px; color: #94a3b8; margin-top: 16px; }
        .text-petugas-wrap { color: #475569; font-weight: 500; }
        .nama-petugas-bold { font-weight: 700; color: #1e293b; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <div class="wrapper">
        
        <div class="panel-input">
            <h2 class="title-main">Pembuat Laporan Instan</h2>
            <p class="subtitle-main">Gunakan menu di bawah untuk mengatur konten laporan harian.</p>

            <div class="grid-kembar">
                <div class="grup-field">
                    <label class="label-style">Tanggal</label>
                    <input type="date" id="inputTanggal">
                </div>
                <div class="grup-field">
                    <label class="label-style">Nama Petugas</label>
                    <input type="text" id="inputPetugas" value="Tim Dokumentasi">
                </div>
            </div>

            <div class="grup-field">
                <label class="label-style">Jumlah Kegiatan dalam 1 Halaman</label>
                <div class="wrapper-slot">
                    <button type="button" onclick="setJumlahKegiatan(1)" id="btnSet-1" class="btn-pilih-slot aktif">1</button>
                    <button type="button" onclick="setJumlahKegiatan(2)" id="btnSet-2" class="btn-pilih-slot">2</button>
                    <button type="button" onclick="setJumlahKegiatan(3)" id="btnSet-3" class="btn-pilih-slot">3</button>
                    <button type="button" onclick="setJumlahKegiatan(4)" id="btnSet-4" class="btn-pilih-slot">4</button>
                </div>
            </div>

            <div id="formKegiatanContainer"></div>

            <button id="btnDownload" class="btn-unduh-jpg">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                Unduh Laporan (JPG)
            </button>
        </div>

        <span class="text-pratinjau-tag">Pratinjau Hasil Cetak:</span>
        
        <div id="templateLaporan">
            <div class="top-accent-line"></div>
            
            <div class="header-poster">
                <div class="header-left">
                    <div class="logo-sekolah-box">SDN</div>
                    <div>
                        <div class="title-sekolah">SD NEGERI SENDEN 2</div>
                        <div class="subtitle-sekolah">Dokumentasi Kegiatan Harian</div>
                    </div>
                </div>
                <span id="viewTanggal" class="badge-tanggal">30 Mei 2026</span>
            </div>

            <div id="viewKegiatanList" class="konten-kegiatan-render"></div>

            <div class="footer-poster">
                <div>*Digenerate instan via Aplikasi Dokumentasi Sekolah</div>
                <div class="text-petugas-wrap">Petugas: <span id="viewPetugas" class="nama-petugas-bold">Tim Dokumentasi</span></div>
            </div>
        </div>

    </div>

    <script>
        let jumlahKegiatanAktif = 1;
        const dataDefault = [
            { nama: "Pendampingan TKA Kelas VI", desc: "Pendampingan persiapan ujian.", foto: "" },
            { nama: "Rapat Koordinasi Guru", desc: "Membahas evaluasi mingguan sekolah.", foto: "" },
            { nama: "Kerja Bakti Lingkungan", desc: "", foto: "" },
            { nama: "Penyusunan Laporan BOS", desc: "", foto: "" }
        ];

        const inputTanggal = document.getElementById('inputTanggal');
        const inputPetugas = document.getElementById('inputPetugas');
        const viewTanggal = document.getElementById('viewTanggal');
        const viewPetugas = document.getElementById('viewPetugas');
        const formContainer = document.getElementById('formKegiatanContainer');
        const viewContainer = document.getElementById('viewKegiatanList');
        const btnDownload = document.getElementById('btnDownload');
        const templateLaporan = document.getElementById('templateLaporan');

        const hariIni = new Date().toISOString().split('T')[0];
        inputTanggal.value = hariIni;
        formatDanSetTanggal(hariIni);

        inputTanggal.addEventListener('input', (e) => formatDanSetTanggal(e.target.value));
        inputPetugas.addEventListener('input', (e) => {
            viewPetugas.innerText = e.target.value.trim() || "-";
        });

        function formatDanSetTanggal(dateString) {
            if(!dateString) return;
            const opsi = { day: 'numeric', month: 'long', year: 'numeric' };
            const date = new Date(dateString);
            viewTanggal.innerText = date.toLocaleDateString('id-ID', opsi);
        }

        function setJumlahKegiatan(jumlah) {
            jumlahKegiatanAktif = jumlah;
            for(let i=1; i<=4; i++) {
                const btn = document.getElementById(`btnSet-${i}`);
                if(i === jumlah) {
                    btn.classList.add('aktif');
                } else {
                    btn.classList.remove('aktif');
                }
            }
            renderFormDanPreview();
        }

        function renderFormDanPreview() {
            formContainer.innerHTML = '';
            viewContainer.innerHTML = '';

            // Penyesuaian ukuran kertas dan tinggi foto secara ideal & proporsional
            let fotoHeight = "150px";
            if (jumlahKegiatanAktif === 1) {
                templateLaporan.style.height = "520px";
                fotoHeight = "250px";
            } else if (jumlahKegiatanAktif === 2) {
                templateLaporan.style.height = "750px";
                fotoHeight = "190px";
            } else if (jumlahKegiatanAktif === 3) {
                templateLaporan.style.height = "920px";
                fotoHeight = "140px";
            } else if (jumlahKegiatanAktif === 4) {
                templateLaporan.style.height = "1120px";
                fotoHeight = "115px";
            }

            for (let i = 1; i <= jumlahKegiatanAktif; i++) {
                const def = dataDefault[i-1];

                // BUAT PANEL INPUT DATA (KIRI)
                const formGroup = document.createElement('div');
                formGroup.className = "box-kegiatan-input";
                formGroup.innerHTML = `
                    <div class="text-kegiatan-id">SLOT KEGIATAN #${i}</div>
                    <div class="grup-field">
                        <input type="text" id="keg-nama-${i}" placeholder="Nama Kegiatan" value="${def.nama}">
                    </div>
                    <div class="grup-field">
                        <input type="text" id="keg-desc-${i}" placeholder="Deskripsi Singkat (Opsional)" value="${def.desc}">
                    </div>
                    <div class="grup-field">
                        <input type="file" id="keg-foto-${i}" accept="image/*">
                    </div>
                `;
                formContainer.appendChild(formGroup);

                // SUSUNAN RENDERING POSTER (NAMA -> FOTO -> DESKRIPSI)
                const viewRow = document.createElement('div');
                viewRow.className = "baris-kegiatan";
                viewRow.innerHTML = `
                    <div class="render-nama-kegiatan" id="pv-nama-${i}">${def.nama}</div>
                    <div class="render-bingkai-foto" id="pv-box-foto-${i}" style="height: ${fotoHeight};">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                    </div>
                    <div class="render-deskripsi-kegiatan" id="pv-desc-${i}">${def.desc}</div>
                `;
                viewContainer.appendChild(viewRow);

                const inNama = document.getElementById(`keg-nama-${i}`);
                const inDesc = document.getElementById(`keg-desc-${i}`);
                const inFoto = document.getElementById(`keg-foto-${i}`);
                
                const pvNama = document.getElementById(`pv-nama-${i}`);
                const pvDesc = document.getElementById(`pv-desc-${i}`);
                const pvBoxFoto = document.getElementById(`pv-box-foto-${i}`);

                if(!def.desc) pvDesc.style.display = 'none';

                inNama.addEventListener('input', (e) => {
                    pvNama.innerText = e.target.value.trim() || `Kegiatan ${i}`;
                    dataDefault[i-1].nama = e.target.value;
                });

                inDesc.addEventListener('input', (e) => {
                    const txt = e.target.value.trim();
                    dataDefault[i-1].desc = e.target.value;
                    if(txt === "") {
                        pvDesc.style.display = 'none';
                    } else {
                        pvDesc.style.display = 'block';
                        pvDesc.innerText = txt;
                    }
                });

                inFoto.addEventListener('change', function(e) {
                    const file = e.target.files[0];
                    if(file) {
                        const reader = new FileReader();
                        reader.onload = function(event) {
                            pvBoxFoto.innerHTML = `<img src="${event.target.result}">`;
                            dataDefault[i-1].foto = event.target.result;
                        };
                        reader.readAsDataURL(file);
                    }
                });
                
                if(def.foto) {
                    pvBoxFoto.innerHTML = `<img src="${def.foto}">`;
                }
            }
        }

        renderFormDanPreview();

        // EKSPOR JPG SANGAT HD & PROPORSI AMAN
        btnDownload.addEventListener('click', function() {
            const textAwal = btnDownload.innerHTML;
            btnDownload.innerHTML = "Memproses...";
            btnDownload.disabled = true;

            html2canvas(templateLaporan, {
                scale: 2.5, 
                useCORS: true,
                allowTaint: true,
                backgroundColor: "#ffffff",
                logging: false
            }).then(canvas => {
                const image = canvas.toDataURL('image/jpeg', 0.95);
                const link = document.createElement('a');
                const tglFile = inputTanggal.value || 'laporan';
                
                link.download = `laporan-harian-${tglFile}.jpg`;
                link.href = image;
                
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                btnDownload.innerHTML = textAwal;
                btnDownload.disabled = false;
            }).catch(err => {
                alert("Gagal memproses gambar: " + err);
                btnDownload.innerHTML = textAwal;
                btnDownload.disabled = false;
            });
        });
    </script>
</body>
</html>
