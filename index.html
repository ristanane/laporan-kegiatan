<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Laporan Kegiatan SDN Senden 2</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@3"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght text-slate-400;500;600;700&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc !important; 
            color: #1e293b !important; 
        }
        .bg-custom-blue { background-color: #2563eb !important; }
        .bg-custom-light-blue { background-color: #eff6ff !important; }
        .border-custom-blue { border-color: #bfdbfe !important; }
        .text-custom-blue { color: #2563eb !important; }
        .bg-custom-card { background-color: #ffffff !important; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-5 bg-custom-card p-6 rounded-2xl shadow-sm border border-[1px] border-slate-100 flex flex-col gap-5 max-h-[90vh] overflow-y-auto">
            <div>
                <h2 class="text-xl font-bold text-slate-900">Pembuat Laporan Proporsional</h2>
                <p class="text-xs text-slate-500 mt-1">Nama kegiatan di atas, ukuran foto pas (tidak kebesaran/kekecilan).</p>
            </div>
            <hr class="border-slate-100">

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">Tanggal</label>
                    <input type="date" id="inputTanggal" class="w-full px-3 py-1.5 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">Nama Petugas</label>
                    <input type="text" id="inputPetugas" placeholder="Nama Guru/Staf" value="Tim Dokumentasi" class="w-full px-3 py-1.5 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-blue-500">
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1.5">Jumlah Kegiatan dalam 1 Laporan</label>
                <div class="grid grid-cols-4 gap-2">
                    <button type="button" onclick="setJumlahKegiatan(1)" id="btnSet-1" class="py-2 text-sm font-semibold rounded-lg border bg-custom-blue text-white border-blue-600">1</button>
                    <button type="button" onclick="setJumlahKegiatan(2)" id="btnSet-2" class="py-2 text-sm font-semibold rounded-lg border bg-white text-slate-600 border-slate-200 hover:bg-slate-50">2</button>
                    <button type="button" onclick="setJumlahKegiatan(3)" id="btnSet-3" class="py-2 text-sm font-semibold rounded-lg border bg-white text-slate-600 border-slate-200 hover:bg-slate-50">3</button>
                    <button type="button" onclick="setJumlahKegiatan(4)" id="btnSet-4" class="py-2 text-sm font-semibold rounded-lg border bg-white text-slate-600 border-slate-200 hover:bg-slate-50">4</button>
                </div>
            </div>

            <hr class="border-slate-100">

            <div id="formKegiatanContainer" class="flex flex-col gap-4">
                </div>

            <button id="btnDownload" class="w-full mt-2 bg-custom-blue hover:bg-blue-700 text-white text-sm font-semibold py-3 px-4 rounded-xl transition duration-200 shadow-sm flex justify-center items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                Unduh Laporan (JPG)
            </button>
        </div>

        <div class="lg:col-span-7 flex flex-col items-center justify-start">
            <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 self-start lg:self-center">Pratinjau Hasil Laporan</span>
            
            <div id="templateLaporan" style="background-color: #ffffff !important;" class="w-[480px] h-[660px] p-6 shadow-xl border border-slate-200 flex flex-col justify-between relative overflow-hidden select-none">
                
                <div class="absolute top-0 left-0 right-0 h-1.5 bg-custom-blue"></div>

                <div class="flex items-center justify-between border-b border-slate-100 pb-2.5 mb-2">
                    <div class="flex items-center gap-2.5">
                        <div class="w-8 h-8 bg-custom-light-blue rounded-lg flex items-center justify-center border border-custom-blue text-custom-blue font-bold text-[10px]">
                            SDN
                        </div>
                        <div>
                            <h1 class="text-xs font-bold text-slate-900 tracking-tight">SD NEGERI SENDEN 2</h1>
                            <p class="text-[8px] text-slate-400 uppercase tracking-wider font-semibold">Dokumentasi Kegiatan Harian</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <span id="viewTanggal" class="inline-block bg-slate-100 text-slate-700 text-[9px] font-semibold px-2.5 py-0.5 rounded-full">30 Mei 2026</span>
                    </div>
                </div>

                <div id="viewKegiatanList" class="flex-grow flex flex-col justify-start gap-3 overflow-hidden my-1">
                    </div>

                <div class="border-t border-slate-100 pt-2 flex justify-between items-center text-[9px] text-slate-400">
                    <div>*Digenerate instan via Sistem Dokumentasi Sekolah</div>
                    <div class="font-medium text-slate-600">Petugas: <span id="viewPetugas" class="font-bold text-slate-700">Tim Dokumentasi</span></div>
                </div>

            </div>
        </div>

    </div>

    <script {
    }>
        let jumlahKegiatanAktif = 1;
        const dataDefault = [
            { nama: "Pendampingan TKA Kelas VI", desc: "Pendampingan persiapan ujian.", foto: "" },
            { nama: "Rapat Koordinasi Guru", desc: "Membahas evaluasi mingguan sekolah.", foto: "" },
            { nama: "Kerja Bakti Lingkungan Sekolah", desc: "", foto: "" },
            { nama: "Penyusunan Laporan BOS", desc: "", foto: "" }
        ];

        const inputTanggal = document.getElementById('inputTanggal');
        const inputPetugas = document.getElementById('inputPetugas');
        const viewTanggal = document.getElementById('viewTanggal');
        const viewPetugas = document.getElementById('viewPetugas');
        const formContainer = document.getElementById('formKegiatanContainer');
        const viewContainer = document.getElementById('viewKegiatanList');
        const btnDownload = document.getElementById('btnDownload');

        const hariIni = new Date().toISOString().split('T')[0];
        inputTanggal.value = hariIni;
        formatDanSetTanggal(hariIni);

        inputTanggal.addEventListener('input', (e) => formatDanSetTanggal(e.target.value));
        inputPetugas.addEventListener('input', (e) => {
            viewPetugas.innerText = e.target.value.trim() || "-";
        });

        function formatDanSetTanggal(dateString) {
            if(!dateString) return;
            const opsi = { day: 'numeric', month: 'long', year: 'numeric' };
            const date = new Date(dateString);
            viewTanggal.innerText = date.toLocaleDateString('id-ID', opsi);
        }

        function setJumlahKegiatan(jumlah) {
            jumlahKegiatanAktif = jumlah;
            for(let i=1; i<=4; i++) {
                const btn = document.getElementById(`btnSet-${i}`);
                if(i === jumlah) {
                    btn.setAttribute('style', 'background-color: #2563eb !important; color: #ffffff !important;');
                } else {
                    btn.setAttribute('style', 'background-color: #ffffff !important; color: #475569 !important;');
                }
            }
            renderFormDanPreview();
        }

        function renderFormDanPreview() {
            formContainer.innerHTML = '';
            viewContainer.innerHTML = '';

            // Pengaturan ukuran box foto agar fleksibel mengikuti jumlah kegiatan
            let fotoSizeClass = "w-32 h-24"; // Ukuran default ideal untuk 3-4 kegiatan
            if (jumlahKegiatanAktif === 1) fotoSizeClass = "w-full h-64"; // Kalau cuma 1 kegiatan, fotonya dibuat megah
            if (jumlahKegiatanAktif === 2) fotoSizeClass = "w-full h-40"; // Kalau 2 kegiatan, ukuran sedang lebar

            for (let i = 1; i <= jumlahKegiatanAktif; i++) {
                const def = dataDefault[i-1];

                // 1. GENERATE FORM INPUT
                const formGroup = document.createElement('div');
                formGroup.className = "p-4 bg-slate-50 rounded-xl border border-slate-200 flex flex-col gap-2";
                formGroup.innerHTML = `
                    <span class="text-xs font-bold text-custom-blue">KEGIATAN #${i}</span>
                    <div>
                        <label class="block text-[10px] font-medium text-slate-500 mb-0.5">Nama Kegiatan</label>
                        <input type="text" id="keg-nama-${i}" placeholder="Masukkan nama kegiatan" value="${def.nama}" class="w-full px-2.5 py-1.5 border border-slate-200 rounded-lg text-xs focus:outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-[10px] font-medium text-slate-500 mb-0.5">Deskripsi (Opsional)</label>
                        <input type="text" id="keg-desc-${i}" placeholder="Kosongkan jika tidak ada detail" value="${def.desc}" class="w-full px-2.5 py-1.5 border border-slate-200 rounded-lg text-xs focus:outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-[10px] font-medium text-slate-500 mb-0.5">Foto Kegiatan</label>
                        <input type="file" id="keg-foto-${i}" accept="image/*" class="w-full text-xs text-slate-500 file:mr-3 file:py-1 file:px-2.5 file:rounded file:border-0 file:text-[10px] file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
                    </div>
                `;
                formContainer.appendChild(formGroup);

                // 2. GENERATE PREVIEW (NAMA DI ATAS, FOTO + DESC DI BAWAHNYA)
                const viewRow = document.createElement('div');
                viewRow.className = "flex flex-col gap-1 border-b border-slate-100/80 pb-2 last:border-0 last:pb-0";
                
                // Kondisi layout untuk 3 & 4 kegiatan: foto di kiri, deskripsi di kanan agar hemat tempat
                if (jumlahKegiatanAktif >= 3) {
                    viewRow.innerHTML = `
                        <div>
                            <h3 id="pv-nama-${i}" class="text-xs font-bold text-slate-800 leading-tight">${def.nama}</h3>
                        </div>
                        <div class="flex gap-3 items-start mt-0.5">
                            <div id="pv-box-foto-${i}" style="background-color: #f1f5f9 !important;" class="${fotoSizeClass} rounded-lg border border-slate-200 flex flex-col items-center justify-center text-slate-300 overflow-hidden flex-shrink-0">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                            </div>
                            <div class="flex-grow min-w-0">
                                <p id="pv-desc-${i}" class="text-[10px] text-slate-500 leading-relaxed text-justify line-clamp-3">${def.desc}</p>
                            </div>
                        </div>
                    `;
                } else {
                    // Kondisi layout untuk 1 & 2 kegiatan (Foto besar vertikal penuh)
                    viewRow.innerHTML = `
                        <div>
                            <h3 id="pv-nama-${i}" class="text-xs font-bold text-slate-800 leading-tight mb-1">${def.nama}</h3>
                        </div>
                        <div id="pv-box-foto-${i}" style="background-color: #f1f5f9 !important;" class="${fotoSizeClass} rounded-xl border border-slate-200 flex flex-col items-center justify-center text-slate-300 overflow-hidden flex-shrink-0">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                        </div>
                        <div class="mt-1">
                            <p id="pv-desc-${i}" class="text-[10px] text-slate-500 leading-relaxed text-justify">${def.desc}</p>
                        </div>
                    `;
                }
                
                viewContainer.appendChild(viewRow);

                const inNama = document.getElementById(`keg-nama-${i}`);
                const inDesc = document.getElementById(`keg-desc-${i}`);
                const inFoto = document.getElementById(`keg-foto-${i}`);
                
                const pvNama = document.getElementById(`pv-nama-${i}`);
                const pvDesc = document.getElementById(`pv-desc-${i}`);
                const pvBoxFoto = document.getElementById(`pv-box-foto-${i}`);

                if(!def.desc) pvDesc.style.display = 'none';

                inNama.addEventListener('input', (e) => {
                    pvNama.innerText = e.target.value.trim() || `Kegiatan ${i}`;
                    dataDefault[i-1].nama = e.target.value;
                });

                inDesc.addEventListener('input', (e) => {
                    const txt = e.target.value.trim();
                    dataDefault[i-1].desc = e.target.value;
                    if(txt === "") {
                        pvDesc.style.display = 'none';
                    } else {
                        pvDesc.style.display = 'block';
                        pvDesc.innerText = txt;
                    }
                });

                inFoto.addEventListener('change', function(e) {
                    const file = e.target.files[0];
                    if(file) {
                        const reader = new FileReader();
                        reader.onload = function(event) {
                            pvBoxFoto.innerHTML = `<img src="${event.target.result}" class="w-full h-full object-cover">`;
                            dataDefault[i-1].foto = event.target.result;
                        };
                        reader.readAsDataURL(file);
                    }
                });
                
                if(def.foto) {
                    pvBoxFoto.innerHTML = `<img src="${def.foto}" class="w-full h-full object-cover">`;
                }
            }
        }

        renderFormDanPreview();

        btnDownload.addEventListener('click', function() {
            const target = document.getElementById('templateLaporan');
            const textAwal = btnDownload.innerHTML;
            btnDownload.innerHTML = "Memproses Gambar...";
            btnDownload.disabled = true;

            html2canvas(target, {
                scale: 2.5, 
                useCORS: true,
                allowTaint: true,
                backgroundColor: "#ffffff",
                logging: false
            }).then(canvas => {
                const image = canvas.toDataURL('image/jpeg', 0.95);
                const link = document.createElement('a');
                const tglFile = inputTanggal.value || 'laporan';
                
                link.download = `laporan-harian-${tglFile}.jpg`;
                link.href = image;
                
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                btnDownload.innerHTML = textAwal;
                btnDownload.disabled = false;
